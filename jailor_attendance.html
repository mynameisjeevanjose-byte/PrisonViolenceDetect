<!DOCTYPE html>
<html>
<head>
    <title>Attendance Logs - Jailor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Daily Attendance Log</h2>
            <a href="{{ url_for('jailor_dashboard') }}" class="btn btn-secondary">Back to Dashboard</a>
        </div>

        <div class="card p-3 mb-4">
            <form method="GET" class="row g-3">
                <div class="col-md-8">
                    <label class="form-label">Select Date</label>
                    <input type="date" name="date" class="form-control" value="{{ search_date }}">
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">View Logs</button>
                </div>
            </form>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Roll No</th>
                            <th>Name</th>
                            <th>Cell</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for log in logs %}
                        <tr>
                            <td>{{ log.inmate.nominal_roll }}</td>
                            <td>{{ log.inmate.name }}</td>
                            <td>{{ log.inmate.cell_assignment }}</td>
                            <td>
                                <span class="badge {% if log.status == 'Present' %}bg-success{% else %}bg-danger{% endif %}">
                                    {{ log.status }}
                                </span>
                            </td>
                        </tr>
                        {% else %}
                        <tr><td colspan="4" class="text-center">No attendance marked for this date yet.</td></tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
